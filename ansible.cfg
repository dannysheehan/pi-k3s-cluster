# Ansible configuration for pi-cluster
# This file configures Ansible to use project-local collections and roles

[defaults]
# Use local collections directory (installed via requirements.yml)
collections_path = ./collections:~/.ansible/collections:/usr/share/ansible/collections

# Use local roles directory if needed in future
roles_path = ./roles:~/.ansible/roles:/usr/share/ansible/roles

# Default inventory file
inventory = ./hosts.ini

# Disable host key checking for initial setup (enable in production)
host_key_checking = False

# SSH connection settings
private_key_file = ~/.ssh/id_rsa

# Increase timeout for Raspberry Pi operations
timeout = 30

# Reduce SSH connection overhead
[ssh_connection]
pipelining = True
ssh_args = -o ControlMaster=auto -o ControlPersist=60s

# Privilege escalation defaults
[privilege_escalation]
become = True
become_method = sudo
become_user = root
become_ask_pass = True
