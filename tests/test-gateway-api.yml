apiVersion: v1
kind: List
items:
  - apiVersion: v1
    kind: Namespace
    metadata:
      name: test-traefik-gateway
  - apiVersion: gateway.networking.k8s.io/v1
    kind: Gateway
    metadata:
      name: traefik-gateway
      namespace: test-traefik-gateway
    spec:
      gatewayClassName: traefik
      listeners:
        - name: http
          protocol: HTTP
          port: 80
          allowedRoutes:
            namespaces:
              from: Same
  - apiVersion: apps/v1
    kind: Deployment
    metadata:
      name: hello-app
      namespace: test-traefik-gateway
    spec:
      replicas: 2
      selector:
        matchLabels:
          app: hello-app
      template:
        metadata:
          labels:
            app: hello-app
        spec:
          containers:
            - name: hello
              image: hashicorp/http-echo:1.0.0
              args:
                - "-text=Hello from Traefik Gateway API! Pod: $(HOSTNAME)"
                - "-listen=:8080"
              ports:
                - containerPort: 8080
              env:
                - name: HOSTNAME
                  valueFrom:
                    fieldRef:
                      fieldPath: metadata.name
  - apiVersion: v1
    kind: Service
    metadata:
      name: hello-app
      namespace: test-traefik-gateway
    spec:
      selector:
        app: hello-app
      ports:
        - protocol: TCP
          port: 80
          targetPort: 8080
  - apiVersion: gateway.networking.k8s.io/v1
    kind: HTTPRoute
    metadata:
      name: hello-route
      namespace: test-traefik-gateway
    spec:
      parentRefs:
        - name: traefik-gateway
          namespace: test-traefik-gateway
      hostnames:
        - "traefik-gw.local"
      rules:
        - matches:
            - path:
                type: PathPrefix
                value: /
          backendRefs:
            - name: hello-app
              port: 80
