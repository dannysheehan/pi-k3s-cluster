---
# ============================================================================
# k3s-add-master.yml - Add Master Nodes to Existing K3s HA Cluster
# ============================================================================
#
# USAGE: ansible-playbook k3s-add-master.yml --limit <node-name>
#
# This playbook safely adds control plane nodes to an existing K3s HA cluster.
# The --limit flag is REQUIRED. Masters are added one at a time for safety.
#
# Examples:
#   # Add a second master for HA
#   ansible-playbook k3s-add-master.yml --limit k3s-ctl-02
#
#   # Add a third master (recommended for production)
#   ansible-playbook k3s-add-master.yml --limit k3s-ctl-03
#
# Prerequisites:
#   - First master initialised with --cluster-init (02-k3s-install.yml)
#   - Infrastructure prepared on target node (01-infra-prep.yml)
#   - Node added to [masters] group in hosts.ini
#   - Odd number of masters recommended (1, 3, 5) for etcd quorum
#
# Safety Features:
#   - Requires --limit flag (fails without it)
#   - Validates etcd cluster health before joining
#   - Serial execution (one master at a time)
#   - Idempotent - safe to run on already-joined masters
#
# Important Notes:
#   - Adding a master temporarily affects cluster during etcd sync
#   - Always add one master at a time, wait for sync before adding next
#   - After adding, verify: kubectl get nodes -l node-role.kubernetes.io/control-plane
#
# ============================================================================

- name: Validate Execution Parameters
  hosts: localhost
  gather_facts: no
  tasks:
    - name: Fail if no --limit specified
      fail:
        msg: |
          
          ╔══════════════════════════════════════════════════════════════════╗
          ║  ERROR: You must specify --limit to target specific nodes        ║
          ╠══════════════════════════════════════════════════════════════════╣
          ║  This playbook requires explicit node targeting to prevent       ║
          ║  accidental runs against all masters.                            ║
          ║                                                                  ║
          ║  Usage:                                                          ║
          ║    ansible-playbook k3s-add-master.yml --limit k3s-ctl-02        ║
          ║                                                                  ║
          ║  Important: Add masters ONE AT A TIME for etcd stability.        ║
          ╚══════════════════════════════════════════════════════════════════╝
      when: ansible_limit is not defined

    - name: Warn if targeting first master
      debug:
        msg: |
          ⚠️  WARNING: The first master ({{ groups['masters'][0] }}) should be
          initialised using 02-k3s-install.yml, not this playbook.
          
          This playbook is for adding ADDITIONAL masters to an existing cluster.
      when: ansible_limit is defined and groups['masters'][0] in ansible_limit

- name: Add Master Node to K3s Cluster
  hosts: masters
  become: yes
  serial: 1  # Critical: Add masters one at a time for etcd stability
  vars:
    k3s_server_args: >-
      --data-dir /mnt/ssd/k3s
      --flannel-backend=none
      --disable-network-policy
      --disable-kube-proxy
      --disable servicelb
      --disable traefik
  tasks:
    # Skip the first master (it's the existing one)
    - name: Skip first master
      meta: end_host
      when: inventory_hostname == groups['masters'][0]

    # -------------------------------------------------------------------------
    # Control Plane Validation (delegated so --limit doesn't skip it)
    # -------------------------------------------------------------------------
    - name: Check K3s server is running on first master
      command: systemctl is-active k3s
      delegate_to: "{{ groups['masters'][0] }}"
      run_once: true
      changed_when: false
      failed_when: k3s_status.rc != 0
      register: k3s_status

    - name: Check K3s API is reachable
      command: kubectl get --raw=/healthz
      environment:
        KUBECONFIG: /etc/rancher/k3s/k3s.yaml
      delegate_to: "{{ groups['masters'][0] }}"
      run_once: true
      changed_when: false
      failed_when: api_health.rc != 0
      register: api_health

    - name: Check etcd cluster health
      command: kubectl get --raw=/healthz/etcd
      environment:
        KUBECONFIG: /etc/rancher/k3s/k3s.yaml
      delegate_to: "{{ groups['masters'][0] }}"
      run_once: true
      changed_when: false
      register: etcd_health
      failed_when: false

    - name: Fail if etcd is unhealthy
      fail:
        msg: |
          
          ╔══════════════════════════════════════════════════════════════════╗
          ║  ERROR: etcd cluster is not healthy                              ║
          ╠══════════════════════════════════════════════════════════════════╣
          ║  Cannot add a new master while etcd is unhealthy.                ║
          ║                                                                  ║
          ║  Please investigate and fix etcd issues first:                   ║
          ║    kubectl get --raw=/healthz/etcd                               ║
          ║    journalctl -u k3s -f                                          ║
          ╚══════════════════════════════════════════════════════════════════╝
      when: etcd_health.rc != 0

    - name: Get current master nodes
      command: kubectl get nodes -l node-role.kubernetes.io/control-plane=true -o name
      environment:
        KUBECONFIG: /etc/rancher/k3s/k3s.yaml
      delegate_to: "{{ groups['masters'][0] }}"
      run_once: true
      register: current_masters
      changed_when: false

    - name: Display current cluster state
      debug:
        msg: |
          
          ╔══════════════════════════════════════════════════════════════════╗
          ║  Current Cluster State                                           ║
          ╠══════════════════════════════════════════════════════════════════╣
          ║  API Health:     ✓ Healthy
          ║  etcd Health:    ✓ Healthy
          ║  Master Count:   {{ current_masters.stdout_lines | length }}
          ║  Masters:        {{ current_masters.stdout_lines | join(', ') | replace('node/', '') }}
          ╚══════════════════════════════════════════════════════════════════╝
      run_once: true

    - name: Get server token from first master
      command: cat /mnt/ssd/k3s/server/node-token
      delegate_to: "{{ groups['masters'][0] }}"
      run_once: true
      register: server_token_result
      changed_when: false

    # -------------------------------------------------------------------------
    # Prerequisite Validation
    # -------------------------------------------------------------------------
    - name: Check if SSD mount point exists
      stat:
        path: /mnt/ssd
      register: ssd_mount

    - name: Check if K3s directory exists on SSD
      stat:
        path: /mnt/ssd/k3s
      register: ssd_k3s_dir

    - name: Fail if infrastructure not prepared
      fail:
        msg: |
          
          ╔══════════════════════════════════════════════════════════════════╗
          ║  ERROR: Infrastructure not prepared on {{ inventory_hostname }}  ║
          ╠══════════════════════════════════════════════════════════════════╣
          ║  The SSD is not mounted or K3s directory doesn't exist.          ║
          ║                                                                  ║
          ║  Please run infrastructure preparation first:                    ║
          ║    ansible-playbook 01-infra-prep.yml --limit {{ inventory_hostname }}
          ╚══════════════════════════════════════════════════════════════════╝
      when: not ssd_mount.stat.exists or not ssd_k3s_dir.stat.exists

    # -------------------------------------------------------------------------
    # Idempotency Check - Skip if Already Joined
    # -------------------------------------------------------------------------
    - name: Check if k3s server service exists
      command: systemctl list-unit-files k3s.service
      register: server_service_exists
      failed_when: false
      changed_when: false

    - name: Check if k3s server is running
      command: systemctl is-active k3s
      register: server_status
      failed_when: false
      changed_when: false
      when: server_service_exists.rc == 0 and 'k3s.service' in server_service_exists.stdout

    - name: Check if node exists as control-plane in cluster (prefix match)
      shell: |
        node=$(kubectl get nodes -o name | grep '^node/{{ inventory_hostname }}\b' | head -1 | sed 's|^node/||')
        if [ -z "$node" ]; then exit 1; fi
        role=$(kubectl get node "$node" -o jsonpath='{.metadata.labels.node-role\.kubernetes\.io/control-plane}')
        ready=$(kubectl get node "$node" -o jsonpath='{.status.conditions[?(@.type=="Ready")].status}')
        echo "${node}:${role}:${ready}"
      environment:
        KUBECONFIG: /etc/rancher/k3s/k3s.yaml
      delegate_to: "{{ groups['masters'][0] }}"
      register: node_role
      failed_when: false
      changed_when: false

    - name: Parse node name and role
      set_fact:
        matched_node_name: "{{ node_role.stdout.split(':')[0] }}"
        matched_node_role: "{{ node_role.stdout.split(':')[1] | default('') }}"
        matched_node_ready: "{{ node_role.stdout.split(':')[2] | default('') }}"
      when: node_role.rc == 0

    - name: Set already_joined fact
      set_fact:
        already_joined: "{{ (server_status.rc | default(1)) == 0 and node_role.rc == 0 and (matched_node_role | default('')) == 'true' }}"

    - name: Display status for already joined masters
      debug:
        msg: |
          ✓ Node {{ matched_node_name | default(inventory_hostname) }} is already a control-plane node
          ✓ Server status: {{ 'running' if (server_status.rc | default(1)) == 0 else 'not running' }}
          ✓ Control-plane role: {{ matched_node_role | default('not set') }}
          
          Skipping installation - master is healthy.
      when: already_joined

    # -------------------------------------------------------------------------
    # Clean Up Stale State (if server not running but remnants exist)
    # -------------------------------------------------------------------------
    - name: Check for stale node in cluster (not Ready)
      set_fact:
        stale_node: "{{ node_role.rc == 0 and (matched_node_ready | default('')) != 'True' and not already_joined }}"

    - name: Stop stale k3s service
      systemd:
        name: k3s
        state: stopped
      failed_when: false
      when: stale_node and server_service_exists.rc == 0

    - name: Remove stale server data
      file:
        path: /mnt/ssd/k3s/server
        state: absent
      when: stale_node

    - name: Remove stale node password
      file:
        path: /etc/rancher/node
        state: absent
      when: stale_node

    # -------------------------------------------------------------------------
    # Install K3s Server (Join Existing Cluster)
    # -------------------------------------------------------------------------
    - name: Install K3s server (join existing cluster)
      shell: |
        curl -sfL https://get.k3s.io | \
        INSTALL_K3S_VERSION={{ k3s_version }} \
        K3S_TOKEN={{ server_token_result.stdout }} \
        sh -s - server \
        --server https://{{ master_ip }}:6443 \
        --tls-san {{ hostvars[inventory_hostname]['ansible_host'] }} \
        --tls-san {{ inventory_hostname }} \
        {{ k3s_server_args }}
      when: not already_joined
      register: install_result

    # -------------------------------------------------------------------------
    # Verify Installation
    # -------------------------------------------------------------------------
    - name: Wait for k3s service to be active
      command: systemctl is-active k3s
      register: server_active
      until: server_active.rc == 0
      retries: 30
      delay: 10
      changed_when: false
      when: not already_joined

    - name: Wait for node to appear as control-plane
      shell: |
        node=$(kubectl get nodes -o name | grep '^node/{{ inventory_hostname }}\b' | head -1 | sed 's|^node/||')
        if [ -z "$node" ]; then exit 1; fi
        kubectl get node "$node" -o jsonpath='{.metadata.labels.node-role\.kubernetes\.io/control-plane}'
      environment:
        KUBECONFIG: /etc/rancher/k3s/k3s.yaml
      delegate_to: "{{ groups['masters'][0] }}"
      register: node_check
      until: node_check.stdout == 'true'
      retries: 30
      delay: 10
      changed_when: false
      when: not already_joined

    - name: Wait for etcd to stabilise
      command: kubectl get --raw=/healthz/etcd
      environment:
        KUBECONFIG: /etc/rancher/k3s/k3s.yaml
      delegate_to: "{{ groups['masters'][0] }}"
      register: etcd_final
      until: etcd_final.rc == 0
      retries: 12
      delay: 10
      changed_when: false
      when: not already_joined

    - name: Get updated master count
      command: kubectl get nodes -l node-role.kubernetes.io/control-plane=true -o name
      environment:
        KUBECONFIG: /etc/rancher/k3s/k3s.yaml
      delegate_to: "{{ groups['masters'][0] }}"
      register: updated_masters
      changed_when: false
      when: not already_joined

    - name: Display success message
      debug:
        msg: |
          
          ╔══════════════════════════════════════════════════════════════════╗
          ║  ✓ Successfully added {{ inventory_hostname }} as control-plane  ║
          ╠══════════════════════════════════════════════════════════════════╣
          ║  Master Count:   {{ updated_masters.stdout_lines | length }}
          ║  Masters:        {{ updated_masters.stdout_lines | join(', ') | replace('node/', '') }}
          ║  etcd Status:    ✓ Healthy
          ║                                                                  ║
          ║  Recommended: Wait 30 seconds before adding another master.      ║
          ║                                                                  ║
          ║  Verify with:                                                    ║
          ║    kubectl get nodes -l node-role.kubernetes.io/control-plane    ║
          ║    kubectl get --raw=/healthz/etcd                               ║
          ╚══════════════════════════════════════════════════════════════════╝
      when: not already_joined and install_result is changed
