apiVersion: v1
kind: List
items:
  - apiVersion: v1
    kind: Namespace
    metadata:
      name: test-traefik
  - apiVersion: apps/v1
    kind: Deployment
    metadata:
      name: hello-world
      namespace: test-traefik
    spec:
      replicas: 2
      selector:
        matchLabels:
          app: hello-world
      template:
        metadata:
          labels:
            app: hello-world
        spec:
          containers:
            - name: hello
              image: hashicorp/http-echo:1.0.0
              args:
                - "-text=Hello from Pi Cluster! Host: $(HOSTNAME)"
                - "-listen=:8080"
              ports:
                - containerPort: 8080
              env:
                - name: HOSTNAME
                  valueFrom:
                    fieldRef:
                      fieldPath: metadata.name
  - apiVersion: v1
    kind: Service
    metadata:
      name: hello-world
      namespace: test-traefik
    spec:
      selector:
        app: hello-world
      ports:
        - protocol: TCP
          port: 80
          targetPort: 8080
  - apiVersion: traefik.io/v1alpha1
    kind: IngressRoute
    metadata:
      name: hello-world
      namespace: test-traefik
    spec:
      entryPoints:
        - web
      routes:
        - match: Host(`hello.local`)
          kind: Rule
          services:
            - name: hello-world
              port: 80
