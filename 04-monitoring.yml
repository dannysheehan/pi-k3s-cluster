---
# ============================================================================
# Raspberry Pi K3s Cluster - Victoria Metrics Monitoring Stack
# ============================================================================
#
# This playbook installs a lightweight monitoring stack using Victoria Metrics
# instead of kube-prometheus-stack. Victoria Metrics is ideal for Raspberry Pi
# clusters because:
# - No CRDs required (avoids API server stress)
# - 3x less memory usage than Prometheus
# - 100% PromQL compatible (same dashboards work)
# - Better compression (7x less disk space)
#
# Components installed:
# 1. Victoria Metrics Single (time-series database)
# 2. VictoriaLogs Single (log storage backend)
# 3. VMAgent (metrics scraper)
# 4. Fluent Bit (log shipper DaemonSet)
# 5. Grafana (dashboards — metrics via VictoriaMetrics, logs via VictoriaLogs)
# 6. Node Exporter (host metrics)
#
# Prerequisites:
# - K3s cluster with add-ons installed (03-addons.yml completed)
# - Longhorn storage available for persistent volumes
# - Traefik ingress controller running
# - kubeconfig available at ~/.kube/config-rpi
#
# Access after deployment:
# - Grafana: http://192.168.1.200/grafana (admin / admin)
#   Datasources: VictoriaMetrics (default) + VictoriaLogs
# - Victoria Metrics: kubectl port-forward -n monitoring svc/vmsingle-victoria-metrics-single-server 8428:8428
# - VictoriaLogs:     kubectl port-forward -n monitoring svc/vlogs-victoria-logs-single-server 9428:9428
#
# ============================================================================

- name: Install Victoria Metrics + VictoriaLogs Monitoring Stack
  hosts: localhost
  connection: local
  vars:
    kubeconfig: ~/.kube/config-rpi
  tasks:
    # ========================================================================
    # PREREQUISITES CHECK
    # ========================================================================
    - name: Verify Longhorn is available
      kubernetes.core.k8s_info:
        kubeconfig: "{{ kubeconfig }}"
        kind: StorageClass
        name: longhorn
      register: longhorn_sc
      failed_when: longhorn_sc.resources | length == 0
      retries: 5
      delay: 10
      until: longhorn_sc.resources | length > 0
      tags: [monitoring, prerequisites]

    - name: Verify Traefik is running
      kubernetes.core.k8s_info:
        kubeconfig: "{{ kubeconfig }}"
        kind: Deployment
        namespace: traefik
        name: traefik
      register: traefik_deploy
      failed_when: traefik_deploy.resources | length == 0
      retries: 5
      delay: 10
      until: traefik_deploy.resources | length > 0
      tags: [monitoring, prerequisites]

    # ========================================================================
    # NAMESPACE CREATION
    # ========================================================================
    - name: Create monitoring namespace
      kubernetes.core.k8s:
        kubeconfig: "{{ kubeconfig }}"
        state: present
        definition:
          apiVersion: v1
          kind: Namespace
          metadata:
            name: monitoring
            labels:
              name: monitoring
      tags: [monitoring]

    # ========================================================================
    # UPDATE TRAEFIK TO ENABLE PROMETHEUS METRICS
    # ========================================================================
    - name: Update Traefik to enable Prometheus metrics
      kubernetes.core.helm:
        name: traefik
        chart_ref: traefik/traefik
        chart_version: "30.1.0"
        release_namespace: traefik
        kubeconfig: "{{ kubeconfig }}"
        values:
          service:
            type: LoadBalancer
          providers:
            kubernetesIngress:
              enabled: true
              publishedService:
                enabled: true
            kubernetesGateway:
              enabled: true
          gatewayClass:
            enabled: true
            name: traefik
          ingressRoute:
            dashboard:
              enabled: true
          resources:
            requests:
              cpu: 100m
              memory: 128Mi
            limits:
              cpu: 500m
              memory: 512Mi
          logs:
            access:
              enabled: true
          # Prometheus metrics
          metrics:
            prometheus:
              enabled: true
              entryPoint: metrics
              addEntryPointsLabels: true
              addRoutersLabels: true
              addServicesLabels: true
          ports:
            metrics:
              port: "{{ traefik_metrics_port }}"
              expose:
                default: true
              exposedPort: "{{ traefik_metrics_port }}"
              protocol: TCP
      tags: [monitoring, traefik_metrics]

    # ========================================================================
    # HELM REPOSITORIES
    # ========================================================================
    - name: Add Victoria Metrics Helm Repo
      kubernetes.core.helm_repository:
        name: vm
        repo_url: "https://victoriametrics.github.io/helm-charts/"
      tags: [monitoring, repositories, vmsingle, victorialogs, vmagent]

    - name: Add Grafana Helm Repo
      kubernetes.core.helm_repository:
        name: grafana
        repo_url: "https://grafana.github.io/helm-charts"
      tags: [monitoring, repositories, grafana]

    - name: Add Prometheus Community Helm Repo (for node-exporter)
      kubernetes.core.helm_repository:
        name: prometheus-community
        repo_url: "https://prometheus-community.github.io/helm-charts"
      tags: [monitoring, repositories, node_exporter]

    - name: Add Fluent Helm Repo (for fluent-bit)
      kubernetes.core.helm_repository:
        name: fluent
        repo_url: "https://fluent.github.io/helm-charts"
      tags: [monitoring, repositories, fluent-bit]

    # helm_repository adds repo config but does NOT fetch the chart index.
    # helm repo update is required so subsequent helm install/upgrade tasks
    # can resolve chart versions without a "no chart version found" error.
    - name: Update Helm repo indexes
      ansible.builtin.command: helm repo update vm grafana prometheus-community fluent
      changed_when: false
      tags: [monitoring, repositories, vmsingle, victorialogs, vmagent, node_exporter, grafana, fluent-bit]

    # ========================================================================
    # NODE EXPORTER - Host metrics
    # ========================================================================
    - name: Install Node Exporter
      kubernetes.core.helm:
        name: node-exporter
        chart_ref: prometheus-community/prometheus-node-exporter
        chart_version: "{{ node_exporter_chart_version }}"
        release_namespace: monitoring
        create_namespace: false
        kubeconfig: "{{ kubeconfig }}"
        values:
          resources:
            requests:
              cpu: 50m
              memory: 32Mi
            limits:
              cpu: 100m
              memory: 64Mi
      tags: [monitoring, node_exporter]

    # Several charts assume nodes answer health checks in ~1s. That is often
    # too optimistic on Pi workers under storage or network pressure, so widen
    # the probe budget before concluding the pod is broken.
    - name: Relax Node Exporter probes for slow nodes
      kubernetes.core.k8s:
        kubeconfig: "{{ kubeconfig }}"
        state: patched
        kind: DaemonSet
        namespace: monitoring
        name: node-exporter-prometheus-node-exporter
        definition:
          spec:
            template:
              spec:
                containers:
                  - name: node-exporter
                    readinessProbe:
                      periodSeconds: 15
                      timeoutSeconds: 5
                      failureThreshold: 5
                    livenessProbe:
                      periodSeconds: 15
                      timeoutSeconds: 5
                      failureThreshold: 5
      tags: [monitoring, node_exporter]

    # ========================================================================
    # VICTORIA METRICS SINGLE - Time-series database
    # ========================================================================
    - name: Install Victoria Metrics Single
      kubernetes.core.helm:
        name: vmsingle
        chart_ref: vm/victoria-metrics-single
        chart_version: "{{ victoria_metrics_version }}"
        release_namespace: monitoring
        create_namespace: false
        kubeconfig: "{{ kubeconfig }}"
        timeout: 300s
        values:
          server:
            # Mark storage-backed observability workloads so the scheduler can
            # prefer not to co-locate all of them on one worker. Replica spread
            # in Longhorn does not prevent attached-volume ownership from piling
            # onto the same node.
            podLabels:
              pi-cluster.io/storage-heavy: "true"
            affinity:
              podAntiAffinity:
                preferredDuringSchedulingIgnoredDuringExecution:
                  - weight: 100
                    podAffinityTerm:
                      labelSelector:
                        matchExpressions:
                          - key: pi-cluster.io/storage-heavy
                            operator: In
                            values:
                              - "true"
                      topologyKey: kubernetes.io/hostname
            retentionPeriod: "{{ vm_retention }}"
            persistentVolume:
              enabled: true
              storageClass: "{{ storage_class }}"
              size: "{{ vm_storage_size }}"
            resources:
              requests:
                cpu: 100m
                memory: 256Mi
              limits:
                cpu: 500m
                memory: 512Mi
            # Optimisations for Raspberry Pi
            extraArgs:
              dedup.minScrapeInterval: 30s
              search.maxConcurrentRequests: 2
              search.maxQueueDuration: 30s
      tags: [monitoring, vmsingle]

    # vmsingle is storage-backed and can take longer to become meaningfully
    # ready than stateless web apps. Favor a slower readiness transition over
    # repeated liveness restarts.
    - name: Relax Victoria Metrics probes for storage-backed startup
      kubernetes.core.k8s:
        kubeconfig: "{{ kubeconfig }}"
        state: patched
        kind: StatefulSet
        namespace: monitoring
        name: vmsingle-victoria-metrics-single-server
        definition:
          spec:
            template:
              spec:
                containers:
                  - name: vmsingle
                    readinessProbe:
                      initialDelaySeconds: 10
                      periodSeconds: 15
                      timeoutSeconds: 10
                      failureThreshold: 5
                    livenessProbe:
                      initialDelaySeconds: 60
                      periodSeconds: 30
                      timeoutSeconds: 10
                      failureThreshold: 10
      tags: [monitoring, vmsingle]

    # ========================================================================
    # VICTORIALOGS SINGLE - Log storage backend
    # ========================================================================
    - name: Install VictoriaLogs Single
      kubernetes.core.helm:
        name: vlogs
        chart_ref: vm/victoria-logs-single
        chart_version: "{{ victorialogs_chart_version }}"
        release_namespace: monitoring
        create_namespace: false
        kubeconfig: "{{ kubeconfig }}"
        timeout: 300s
        values:
          server:
            # Use the same label/anti-affinity scheme as Grafana and vmsingle
            # so large PVC-backed monitoring components do not all land on the
            # same worker after a rollout or node recovery.
            podLabels:
              pi-cluster.io/storage-heavy: "true"
            affinity:
              podAntiAffinity:
                preferredDuringSchedulingIgnoredDuringExecution:
                  - weight: 100
                    podAffinityTerm:
                      labelSelector:
                        matchExpressions:
                          - key: pi-cluster.io/storage-heavy
                            operator: In
                            values:
                              - "true"
                      topologyKey: kubernetes.io/hostname
            retentionPeriod: "{{ victorialogs_retention }}"
            persistentVolume:
              enabled: true
              storageClassName: "{{ storage_class }}"
              size: "{{ victorialogs_storage_size }}"
            resources:
              requests:
                cpu: 100m
                memory: 256Mi
              limits:
                cpu: 500m
                memory: 512Mi
      tags: [monitoring, victorialogs]

    # VictoriaLogs has the same failure mode as vmsingle on this hardware:
    # mount or replay work can make the pod slow to answer health checks
    # without the process actually being wedged.
    - name: Relax VictoriaLogs probes for storage-backed startup
      kubernetes.core.k8s:
        kubeconfig: "{{ kubeconfig }}"
        state: patched
        kind: StatefulSet
        namespace: monitoring
        name: vlogs-victoria-logs-single-server
        definition:
          spec:
            template:
              spec:
                containers:
                  - name: vlogs
                    readinessProbe:
                      initialDelaySeconds: 10
                      periodSeconds: 15
                      timeoutSeconds: 10
                      failureThreshold: 5
                    livenessProbe:
                      initialDelaySeconds: 60
                      periodSeconds: 30
                      timeoutSeconds: 10
                      failureThreshold: 10
      tags: [monitoring, victorialogs]

    # Note: VictoriaLogs Single uses a StatefulSet, not a Deployment
    - name: Wait for VictoriaLogs to be ready
      kubernetes.core.k8s_info:
        kubeconfig: "{{ kubeconfig }}"
        kind: StatefulSet
        namespace: monitoring
        name: vlogs-victoria-logs-single-server
      register: vlogs_sts
      until: >
        vlogs_sts.resources is defined and
        vlogs_sts.resources | length > 0 and
        (vlogs_sts.resources[0].status.readyReplicas | default(0)) ==
        (vlogs_sts.resources[0].status.replicas | default(1))
      retries: 30
      delay: 10
      ignore_errors: true
      tags: [monitoring, victorialogs]

    # ========================================================================
    # VMAGENT - Metrics scraper
    # ========================================================================
    - name: Install VMAgent
      kubernetes.core.helm:
        name: vmagent
        chart_ref: vm/victoria-metrics-agent
        chart_version: "{{ vmagent_chart_version }}"
        release_namespace: monitoring
        create_namespace: false
        kubeconfig: "{{ kubeconfig }}"
        timeout: 300s
        values:
          mode: deployment
          # Remote write configuration - required by the chart
          remoteWrite:
            - url: "http://vmsingle-victoria-metrics-single-server.monitoring.svc:8428/api/v1/write"
          resources:
            requests:
              cpu: 50m
              memory: 256Mi
            limits:
              cpu: 200m
              memory: 512Mi
          extraArgs:
            promscrape.streamParse: "{{ vmagent_stream_parse }}"
            promscrape.discovery.concurrency: "{{ vmagent_discovery_concurrency }}"
          # Scrape configurations
          # Keep these jobs conservative and explicit. On small Pi nodes, broad
          # auto-discovery can create duplicate targets and memory spikes.
          config:
            global:
              scrape_interval: "{{ vmagent_scrape_interval }}"
              scrape_timeout: "{{ vmagent_scrape_timeout }}"
            scrape_configs:
              # Kubernetes API Server
              - job_name: kubernetes-apiservers
                kubernetes_sd_configs:
                  - role: endpoints
                scheme: https
                tls_config:
                  ca_file: /var/run/secrets/kubernetes.io/serviceaccount/ca.crt
                  insecure_skip_verify: true
                bearer_token_file: /var/run/secrets/kubernetes.io/serviceaccount/token
                relabel_configs:
                  - source_labels: [__meta_kubernetes_namespace, __meta_kubernetes_service_name, __meta_kubernetes_endpoint_port_name]
                    action: keep
                    regex: default;kubernetes;https

              # Kubelet metrics
              - job_name: kubelet
                kubernetes_sd_configs:
                  - role: node
                scheme: https
                tls_config:
                  ca_file: /var/run/secrets/kubernetes.io/serviceaccount/ca.crt
                  insecure_skip_verify: true
                bearer_token_file: /var/run/secrets/kubernetes.io/serviceaccount/token
                relabel_configs:
                  - action: labelmap
                    regex: __meta_kubernetes_node_label_(.+)
                  - target_label: __address__
                    replacement: kubernetes.default.svc:443
                  - source_labels: [__meta_kubernetes_node_name]
                    target_label: __metrics_path__
                    replacement: /api/v1/nodes/$1/proxy/metrics

              # cAdvisor (container metrics from kubelet)
              - job_name: cadvisor
                kubernetes_sd_configs:
                  - role: node
                scheme: https
                tls_config:
                  ca_file: /var/run/secrets/kubernetes.io/serviceaccount/ca.crt
                  insecure_skip_verify: true
                bearer_token_file: /var/run/secrets/kubernetes.io/serviceaccount/token
                metrics_path: /metrics/cadvisor
                relabel_configs:
                  - action: labelmap
                    regex: __meta_kubernetes_node_label_(.+)
                  - target_label: __address__
                    replacement: kubernetes.default.svc:443
                  - source_labels: [__meta_kubernetes_node_name]
                    target_label: __metrics_path__
                    replacement: /api/v1/nodes/$1/proxy/metrics/cadvisor

              # Node Exporter
              - job_name: node-exporter
                kubernetes_sd_configs:
                  - role: pod
                relabel_configs:
                  - source_labels: [__meta_kubernetes_pod_label_app_kubernetes_io_name]
                    regex: prometheus-node-exporter
                    action: keep
                  - source_labels: [__meta_kubernetes_pod_ip]
                    target_label: __address__
                    replacement: ${1}:9100

              # Longhorn
              - job_name: longhorn
                static_configs:
                  - targets:
                      - longhorn-backend.longhorn-system.svc:9500
                relabel_configs:
                  - source_labels: [__address__]
                    target_label: instance
                    replacement: longhorn

              # Traefik
              # Discover Traefik via service endpoints rather than a hardcoded
              # static target so the scrape survives pod reschedules.
              - job_name: traefik
                kubernetes_sd_configs:
                  - role: endpoints
                    namespaces:
                      names:
                        - traefik
                relabel_configs:
                  - source_labels: [__meta_kubernetes_service_name, __meta_kubernetes_endpoint_port_name]
                    regex: traefik;metrics
                    action: keep
                  - source_labels: [__meta_kubernetes_pod_node_name]
                    target_label: instance
                  - source_labels: [__meta_kubernetes_namespace]
                    target_label: namespace

              # Cilium Agent metrics (port 9962)
              # Scrape cilium pods directly to avoid depending on service
              # annotations. Restrict to the named prometheus port, otherwise
              # vmagent may discover multiple pod ports and create duplicates.
              - job_name: cilium-agent
                kubernetes_sd_configs:
                  - role: pod
                    namespaces:
                      names:
                        - kube-system
                relabel_configs:
                  - source_labels: [__meta_kubernetes_pod_label_k8s_app]
                    regex: cilium
                    action: keep
                  - source_labels: [__meta_kubernetes_pod_container_name]
                    regex: cilium-agent
                    action: keep
                  - source_labels: [__meta_kubernetes_pod_container_port_name]
                    regex: prometheus
                    action: keep
                  - source_labels: [__meta_kubernetes_pod_phase]
                    regex: Running
                    action: keep
                  - source_labels: [__meta_kubernetes_pod_ip]
                    target_label: __address__
                    replacement: ${1}:9962
                  - source_labels: [__meta_kubernetes_pod_name]
                    target_label: pod
                  - source_labels: [__meta_kubernetes_pod_node_name]
                    target_label: node
                  - source_labels: [__meta_kubernetes_namespace]
                    target_label: namespace

              # Hubble metrics (port 9965)
              # Hubble metrics are exposed by the same cilium pods on port 9965.
              # As above, keep the port filter strict to avoid duplicate-target
              # warnings in vmagent logs.
              - job_name: hubble
                kubernetes_sd_configs:
                  - role: pod
                    namespaces:
                      names:
                        - kube-system
                relabel_configs:
                  - source_labels: [__meta_kubernetes_pod_label_k8s_app]
                    regex: cilium
                    action: keep
                  - source_labels: [__meta_kubernetes_pod_container_name]
                    regex: cilium-agent
                    action: keep
                  - source_labels: [__meta_kubernetes_pod_container_port_name]
                    regex: hubble-metrics
                    action: keep
                  - source_labels: [__meta_kubernetes_pod_phase]
                    regex: Running
                    action: keep
                  - source_labels: [__meta_kubernetes_pod_ip]
                    target_label: __address__
                    replacement: ${1}:9965
                  - source_labels: [__meta_kubernetes_pod_name]
                    target_label: pod
                  - source_labels: [__meta_kubernetes_pod_node_name]
                    target_label: node
                  - source_labels: [__meta_kubernetes_namespace]
                    target_label: namespace

              # Kube State Metrics (if installed)
              - job_name: kube-state-metrics
                kubernetes_sd_configs:
                  - role: service
                relabel_configs:
                  - source_labels: [__meta_kubernetes_service_label_app_kubernetes_io_name]
                    regex: kube-state-metrics
                    action: keep
      tags: [monitoring, vmagent]

    # vmagent is lightweight, but on an already busy worker it can still miss
    # short probe deadlines while discovery and remote write queues settle.
    - name: Relax VMAgent probes for loaded nodes
      kubernetes.core.k8s:
        kubeconfig: "{{ kubeconfig }}"
        state: patched
        kind: Deployment
        namespace: monitoring
        name: vmagent-victoria-metrics-agent
        definition:
          spec:
            template:
              spec:
                containers:
                  - name: vmagent
                    readinessProbe:
                      initialDelaySeconds: 10
                      periodSeconds: 15
                      timeoutSeconds: 5
                      failureThreshold: 5
                    livenessProbe:
                      initialDelaySeconds: 15
                      periodSeconds: 20
                      timeoutSeconds: 10
                      failureThreshold: 5
      tags: [monitoring, vmagent]

    - name: Wait for VMAgent deployment to be ready
      kubernetes.core.k8s_info:
        kubeconfig: "{{ kubeconfig }}"
        kind: Deployment
        namespace: monitoring
        name: vmagent-victoria-metrics-agent
      register: vmagent_deploy
      until: >
        vmagent_deploy.resources is defined and
        vmagent_deploy.resources | length > 0 and
        (vmagent_deploy.resources[0].status.readyReplicas | default(0)) ==
        (vmagent_deploy.resources[0].status.replicas | default(1))
      retries: 30
      delay: 10
      failed_when: false
      tags: [monitoring, vmagent]

    - name: Get VMAgent pods for diagnostics
      kubernetes.core.k8s_info:
        kubeconfig: "{{ kubeconfig }}"
        kind: Pod
        namespace: monitoring
        label_selectors:
          - app.kubernetes.io/instance=vmagent
      register: vmagent_pods
      when: >
        vmagent_deploy.resources | default([]) | length == 0 or
        (vmagent_deploy.resources[0].status.readyReplicas | default(0)) !=
        (vmagent_deploy.resources[0].status.replicas | default(1))
      tags: [monitoring, vmagent]

    - name: Get VMAgent pods for verification
      kubernetes.core.k8s_info:
        kubeconfig: "{{ kubeconfig }}"
        kind: Pod
        namespace: monitoring
        label_selectors:
          - app.kubernetes.io/instance=vmagent
      register: vmagent_pods_ready
      changed_when: false
      tags: [monitoring, verification]

    # The smoke test is intentionally lightweight: it proves that series exist
    # in VictoriaMetrics without coupling success to a specific Grafana dashboard.
    - name: Fail with VMAgent rollout diagnostics
      fail:
        msg: >-
          VMAgent deployment did not become ready. Pod phases:
          {{ vmagent_pods.resources | default([]) | map(attribute='status.phase') | list }}.
          Check `kubectl describe deployment/vmagent-victoria-metrics-agent -n monitoring`
          and `kubectl logs -n monitoring -l app.kubernetes.io/instance=vmagent`.
      when: >
        vmagent_deploy.resources | default([]) | length == 0 or
        (vmagent_deploy.resources[0].status.readyReplicas | default(0)) !=
        (vmagent_deploy.resources[0].status.replicas | default(1))
      tags: [monitoring, vmagent]

    # ========================================================================
    # FLUENT BIT - Log shipper DaemonSet
    # ========================================================================
    - name: Install Fluent Bit
      kubernetes.core.helm:
        name: fluent-bit
        chart_ref: fluent/fluent-bit
        chart_version: "{{ fluent_bit_chart_version }}"
        release_namespace: monitoring
        create_namespace: false
        kubeconfig: "{{ kubeconfig }}"
        timeout: 300s
        values:
          resources:
            requests:
              cpu: 50m
              memory: 64Mi
            limits:
              cpu: 100m
              memory: 128Mi
          config:
            # Tail all container logs written by containerd (CRI format)
            inputs: |
              [INPUT]
                  Name              tail
                  Path              /var/log/containers/*.log
                  multiline.parser  cri
                  Tag               kube.*
                  Mem_Buf_Limit     5MB
                  Skip_Long_Lines   On
                  Refresh_Interval  10
            # Enrich log lines with Kubernetes pod/namespace/container metadata
            filters: |
              [FILTER]
                  Name                kubernetes
                  Match               kube.*
                  Kube_URL            https://kubernetes.default.svc:443
                  Kube_CA_File        /var/run/secrets/kubernetes.io/serviceaccount/ca.crt
                  Kube_Token_File     /var/run/secrets/kubernetes.io/serviceaccount/token
                  Kube_Tag_Prefix     kube.var.log.containers.
                  Merge_Log           On
                  K8S-Logging.Parser  On
                  K8S-Logging.Exclude Off

              # VictoriaLogs requires the message to be in the '_msg' field.
              # The Kubernetes filter stores the log line in 'log'; rename it
              # before shipping so Grafana's VictoriaLogs datasource can
              # display the message body correctly.
              [FILTER]
                  Name    modify
                  Match   kube.*
                  Rename  log _msg
            # Ship logs to VictoriaLogs via its Loki-compatible ingest endpoint
            outputs: |
              [OUTPUT]
                  Name              loki
                  Match             kube.*
                  Host              vlogs-victoria-logs-single-server.monitoring.svc
                  Port              9428
                  URI               /insert/loki/api/v1/push
                  Labels            job=fluent-bit
                  auto_kubernetes_labels on
                  Tls               Off
                  Line_Format       json
      tags: [monitoring, fluent-bit]

    # Fluent Bit readiness often fails first during node stalls because it is a
    # DaemonSet on every worker and its health endpoint is sensitive to brief
    # CPU starvation. Give it more time before kubelet restarts it.
    - name: Relax Fluent Bit probes for slow nodes
      kubernetes.core.k8s:
        kubeconfig: "{{ kubeconfig }}"
        state: patched
        kind: DaemonSet
        namespace: monitoring
        name: fluent-bit
        definition:
          spec:
            template:
              spec:
                containers:
                  - name: fluent-bit
                    readinessProbe:
                      periodSeconds: 15
                      timeoutSeconds: 5
                      failureThreshold: 5
                    livenessProbe:
                      periodSeconds: 15
                      timeoutSeconds: 5
                      failureThreshold: 5
      tags: [monitoring, fluent-bit]

    # ========================================================================
    # GRAFANA - Dashboards
    # ========================================================================
    - name: Install Grafana
      kubernetes.core.helm:
        name: grafana
        chart_ref: grafana/grafana
        chart_version: "{{ grafana_version }}"
        release_namespace: monitoring
        create_namespace: false
        kubeconfig: "{{ kubeconfig }}"
        timeout: 300s
        values:
          # Single replica for RPi — avoids unnecessary resource use and
          # Multi-Attach PVC errors with ReadWriteOnce volumes.
          replicas: 1
          # Grafana is storage-backed and uses a single ReadWriteOnce PVC.
          # Prefer not to place it beside the other heavy PVC-backed monitoring
          # pods unless the scheduler has no better option.
          podLabels:
            pi-cluster.io/storage-heavy: "true"
          affinity:
            podAntiAffinity:
              preferredDuringSchedulingIgnoredDuringExecution:
                - weight: 100
                  podAffinityTerm:
                    labelSelector:
                      matchExpressions:
                        - key: pi-cluster.io/storage-heavy
                          operator: In
                          values:
                            - "true"
                    topologyKey: kubernetes.io/hostname
          # Grafana uses a single Longhorn ReadWriteOnce PVC. Recreate avoids
          # rollout overlap where a new pod starts before the old pod releases
          # the volume, which otherwise triggers Multi-Attach errors.
          deploymentStrategy:
            type: Recreate
          adminPassword: "{{ grafana_admin_password }}"
          persistence:
            enabled: true
            storageClassName: "{{ storage_class }}"
            size: "{{ grafana_storage_size }}"
          resources:
            requests:
              cpu: 100m
              memory: 128Mi
            limits:
              cpu: 200m
              memory: 256Mi
          # Grafana can take a few seconds to answer /api/health on this
          # cluster, especially after plugin load or while SQLite is busy.
          # The chart default readiness timeout (1s) is too aggressive and
          # causes the Service endpoint to flap, which Traefik surfaces as 502.
          readinessProbe:
            timeoutSeconds: 5
          # Startup probe prevents the liveness/readiness cycle from declaring
          # Grafana dead while plugins load or SQLite is still warming up on
          # slower storage.
          startupProbe:
            httpGet:
              path: /api/health
              port: 3000
            initialDelaySeconds: 10
            periodSeconds: 10
            timeoutSeconds: 5
            failureThreshold: 30
          # Third-party plugins to install on Grafana startup.
          # Requires outbound internet access from the monitoring namespace on
          # first install — the pod downloads plugins from grafana.com.
          plugins:
            - victoriametrics-logs-datasource
          # Configure for sub-path access
          grafana.ini:
            server:
              root_url: "{{ grafana_root_url }}"
              serve_from_sub_path: true
            auth.anonymous:
              enabled: false
          # Victoria Metrics as datasource
          datasources:
            datasources.yaml:
              apiVersion: 1
              datasources:
                - name: VictoriaMetrics
                  type: prometheus
                  url: http://vmsingle-victoria-metrics-single-server.monitoring.svc:8428
                  access: proxy
                  isDefault: true
                - name: VictoriaLogs
                  type: victoriametrics-logs-datasource
                  uid: victorialogs
                  url: http://vlogs-victoria-logs-single-server.monitoring.svc:9428
                  access: proxy
                  jsonData:
                    maxLines: 1000
          # Dashboard providers
          dashboardProviders:
            dashboardproviders.yaml:
              apiVersion: 1
              providers:
                - name: default
                  orgId: 1
                  folder: ''
                  type: file
                  disableDeletion: false
                  editable: true
                  options:
                    path: /var/lib/grafana/dashboards/default
                - name: infrastructure
                  orgId: 1
                  folder: 'Infrastructure'
                  type: file
                  disableDeletion: false
                  editable: true
                  options:
                    path: /var/lib/grafana/dashboards/infrastructure
                - name: logs
                  orgId: 1
                  folder: 'Logs'
                  type: file
                  disableDeletion: false
                  editable: true
                  options:
                    path: /var/lib/grafana/dashboards/logs
          # Pre-provision community dashboards
          dashboards:
            default:
              # Node Exporter Full
              node-exporter-full:
                gnetId: 1860
                revision: 37
                datasource: VictoriaMetrics
              # Kubernetes Cluster Overview
              k8s-cluster:
                gnetId: 7249
                revision: 1
                datasource: VictoriaMetrics
            infrastructure:
              # Longhorn
              longhorn:
                gnetId: 16888
                revision: 9
                datasource: VictoriaMetrics
              # Traefik
              traefik:
                gnetId: 17346
                revision: 9
                datasource: VictoriaMetrics
              # Hubble
              hubble:
                gnetId: 16612
                revision: 1
                datasource: VictoriaMetrics
          sidecar:
            dashboards:
              enabled: true
              searchNamespace: ALL
            datasources:
              enabled: true
      tags: [monitoring, grafana]

    # ========================================================================
    # TRAEFIK INGRESSROUTE FOR VICTORIALOGS WEB UI
    # ========================================================================
    # VictoriaLogs serves its web UI at /select/vmui/ on the backend service.
    # We expose it under /victorialogs using a StripPrefix middleware so that
    # requests reaching the pod have the correct paths.
    - name: Create VictoriaLogs StripPrefix middleware
      kubernetes.core.k8s:
        kubeconfig: "{{ kubeconfig }}"
        state: present
        definition:
          apiVersion: traefik.io/v1alpha1
          kind: Middleware
          metadata:
            name: vlogs-strip-prefix
            namespace: monitoring
          spec:
            stripPrefix:
              prefixes:
                - /victorialogs
      tags: [monitoring, victorialogs]

    - name: Create VictoriaLogs IngressRoute
      kubernetes.core.k8s:
        kubeconfig: "{{ kubeconfig }}"
        state: present
        definition:
          apiVersion: traefik.io/v1alpha1
          kind: IngressRoute
          metadata:
            name: victorialogs
            namespace: monitoring
          spec:
            entryPoints:
              - web
            routes:
              - match: PathPrefix(`/victorialogs`)
                kind: Rule
                middlewares:
                  - name: vlogs-strip-prefix
                services:
                  - name: vlogs-victoria-logs-single-server
                    port: 9428
      tags: [monitoring, victorialogs]

    # ========================================================================
    # TRAEFIK INGRESSROUTE FOR GRAFANA ACCESS
    # ========================================================================
    # Note: No StripPrefix middleware needed because Grafana is configured with
    # serve_from_sub_path = true and root_url = http://192.168.1.200/grafana
    - name: Create Grafana IngressRoute
      kubernetes.core.k8s:
        kubeconfig: "{{ kubeconfig }}"
        state: present
        definition:
          apiVersion: traefik.io/v1alpha1
          kind: IngressRoute
          metadata:
            name: grafana
            namespace: monitoring
          spec:
            entryPoints:
              - web
            routes:
              - match: PathPrefix(`/grafana`)
                kind: Rule
                services:
                  - name: grafana
                    port: 80
                    # Grafana's Service exposes port 80 -> targetPort 3000.
                    # Traefik occasionally fails to build pod backends for this
                    # translated Service and returns `404 Not Found` with
                    # `no servers found for monitoring/grafana` in its logs.
                    # NativeLB makes Traefik forward to the Service ClusterIP
                    # instead of resolving pod endpoints itself.
                    nativeLB: true
      tags: [monitoring, grafana]

    - name: Create custom Cilium dashboard ConfigMap
      kubernetes.core.k8s:
        kubeconfig: "{{ kubeconfig }}"
        state: present
        # Use a standalone manifest file here rather than embedding a large JSON
        # object in this playbook. It avoids YAML/templating edge cases and makes
        # future dashboard edits easier to review.
        src: "{{ playbook_dir }}/dashboards/cilium-overview-configmap.yaml"
      tags: [monitoring, grafana]

    - name: Create VictoriaLogs Kubernetes Logs dashboard ConfigMap
      kubernetes.core.k8s:
        kubeconfig: "{{ kubeconfig }}"
        state: present
        src: "{{ playbook_dir }}/dashboards/victorialogs-configmap.yaml"
      tags: [monitoring, grafana, victorialogs]

    # ========================================================================
    # VERIFICATION
    # ========================================================================
    # Note: Victoria Metrics Single uses a StatefulSet, not a Deployment
    - name: Wait for Victoria Metrics to be ready
      kubernetes.core.k8s_info:
        kubeconfig: "{{ kubeconfig }}"
        kind: StatefulSet
        namespace: monitoring
        name: vmsingle-victoria-metrics-single-server
      register: vm_sts
      until: >
        vm_sts.resources is defined and
        vm_sts.resources | length > 0 and
        (vm_sts.resources[0].status.readyReplicas | default(0)) ==
        (vm_sts.resources[0].status.replicas | default(1))
      retries: 30
      delay: 10
      ignore_errors: true
      tags: [monitoring, verification]

    - name: Query Victoria Metrics for expected scrape series
      kubernetes.core.k8s_exec:
        kubeconfig: "{{ kubeconfig }}"
        namespace: monitoring
        pod: "{{ vmagent_pod_name }}"
        command: >-
          sh -c "wget -qO- http://vmsingle-victoria-metrics-single-server.monitoring.svc:8428/api/v1/series?match[]={{ item }}"
      vars:
        vmagent_pod_name: "{{ vmagent_pods_ready.resources[0].metadata.name }}"
      register: monitoring_smoke_tests
      changed_when: false
      failed_when: false
      loop: "{{ monitoring_smoke_test_metric_names }}"
      when:
        - vmagent_pods_ready.resources | default([]) | length > 0
      tags: [monitoring, verification]

    - name: Report missing monitoring series
      ansible.builtin.debug:
        msg: >-
          Monitoring smoke test for {{ item.item }} returned no series yet.
          This can be normal immediately after deployment, but if it persists
          check vmagent targets and the exporter endpoint directly.
      loop: "{{ monitoring_smoke_tests.results | default([]) }}"
      when:
        - item.stdout is defined
        - item.stdout is search('"data":\\[\\]')
      tags: [monitoring, verification]

    - name: Get Fluent Bit pods for VictoriaLogs smoke test
      kubernetes.core.k8s_info:
        kubeconfig: "{{ kubeconfig }}"
        kind: Pod
        namespace: monitoring
        label_selectors:
          - app.kubernetes.io/name=fluent-bit
      register: fluent_bit_pods
      changed_when: false
      tags: [monitoring, verification]

    # Query VictoriaLogs from the vmagent pod (which has wget) to confirm
    # that Fluent Bit has successfully shipped at least one log entry.
    - name: Query VictoriaLogs for recently ingested logs
      kubernetes.core.k8s_exec:
        kubeconfig: "{{ kubeconfig }}"
        namespace: monitoring
        pod: "{{ vmagent_pods_ready.resources[0].metadata.name }}"
        command: >-
          sh -c "wget -qO- 'http://vlogs-victoria-logs-single-server.monitoring.svc:9428/select/logsql/query?query=*&limit=1'"
      register: vlogs_smoke_test
      changed_when: false
      failed_when: false
      when:
        - vmagent_pods_ready.resources | default([]) | length > 0
      tags: [monitoring, verification]

    - name: Report VictoriaLogs ingest status
      ansible.builtin.debug:
        msg: >-
          VictoriaLogs smoke test: {{ 'logs ingested successfully' if
          (vlogs_smoke_test.stdout | default('')) | length > 10
          else 'no logs yet — Fluent Bit may still be starting up; check
          kubectl logs -n monitoring -l app.kubernetes.io/name=fluent-bit' }}
      when: vlogs_smoke_test is not skipped
      tags: [monitoring, verification]

    - name: Wait for Grafana to be ready
      kubernetes.core.k8s_info:
        kubeconfig: "{{ kubeconfig }}"
        kind: Deployment
        namespace: monitoring
        name: grafana
      register: grafana_deploy
      until: >
        grafana_deploy.resources is defined and
        grafana_deploy.resources | length > 0 and
        (grafana_deploy.resources[0].status.readyReplicas | default(0)) ==
        (grafana_deploy.resources[0].status.replicas | default(1))
      retries: 30
      delay: 10
      ignore_errors: true

    - name: Display monitoring stack status
      ansible.builtin.debug:
        msg: |
          ============================================================
          VICTORIA METRICS MONITORING STACK DEPLOYED SUCCESSFULLY
          ============================================================
          
          Grafana:
            URL: http://192.168.1.200/grafana
            Username: admin
            Password: {{ grafana_admin_password }}
            Datasources: VictoriaMetrics (default) + VictoriaLogs
          
          Victoria Metrics (port-forward):
            kubectl port-forward -n monitoring svc/vmsingle-victoria-metrics-single-server 8428:8428
            Then access: http://localhost:8428
          
          VictoriaLogs Web UI:
            URL: http://192.168.1.200/victorialogs/select/vmui/

          VictoriaLogs (port-forward / direct API):
            kubectl port-forward -n monitoring svc/vlogs-victoria-logs-single-server 9428:9428
            Then access: http://localhost:9428/select/vmui/
          
          Pre-installed Dashboards:
            - Node Exporter Full (ID: 1860)
            - Kubernetes Cluster Overview (ID: 7249)
            - Longhorn (ID: 16888)
            - Traefik (ID: 17346)
            - Cilium Agent (ID: 16611)
            - Hubble (ID: 16612)
          
          Storage:
            - Victoria Metrics: {{ vm_storage_size }} ({{ vm_retention }} retention)
            - VictoriaLogs:     {{ victorialogs_storage_size }} ({{ victorialogs_retention }} retention)
            - Grafana:          {{ grafana_storage_size }}
          
          Resource Usage (Total):
            - CPU Requests: ~500m
            - Memory Requests: ~896Mi
            - Much lighter than kube-prometheus-stack!
          ============================================================
