apiVersion: v1
kind: List
items:
  - apiVersion: v1
    kind: Namespace
    metadata:
      name: test-longhorn
  - apiVersion: v1
    kind: PersistentVolumeClaim
    metadata:
      name: longhorn-test-pvc
      namespace: test-longhorn
    spec:
      accessModes:
        - ReadWriteOnce
      storageClassName: longhorn
      resources:
        requests:
          storage: 1Gi
  - apiVersion: v1
    kind: Pod
    metadata:
      name: longhorn-test-pod
      namespace: test-longhorn
    spec:
      containers:
        - name: test-container
          image: busybox:1.36
          command:
            - sh
            - -c
            - |
              echo "Testing Longhorn storage..."
              echo "Writing test data to /data/test.txt"
              echo "Longhorn storage test - $(date)" > /data/test.txt
              echo "File contents:"
              cat /data/test.txt
              echo ""
              echo "Pod is running. You can exec into it with:"
              echo "  kubectl exec -it -n test-longhorn longhorn-test-pod -- sh"
              echo ""
              echo "To write more data:"
              echo "  echo 'more data' >> /data/test.txt"
              echo ""
              echo "Keeping pod alive indefinitely..."
              while true; do sleep 3600; done
          volumeMounts:
            - name: longhorn-volume
              mountPath: /data
      volumes:
        - name: longhorn-volume
          persistentVolumeClaim:
            claimName: longhorn-test-pvc
      restartPolicy: Always
